$schema: https://raw.githubusercontent.com/microsoft/policy-mcp/main/schema/policy-v1.0.schema.json
# file system access policy for wassette project
# https://github.com/microsoft/policy-mcp-rs
version: "1.0"
description: "Permission policy for filesystem access in wassette"
permissions:
  storage:
    allow:
      # Allow read access to the wassette project directory
      - uri: "fs:///home/runner/work/wassette/wassette"
        access: ["read"]
      # Allow read and write access to tmp for testing
      - uri: "fs:///tmp"
        access: ["read", "write"]
      # Example: Allow read and write access to a specific directory
      # Uncomment and modify the path below to enable write operations
      # - uri: "fs:///Users/USERNAME/tmp"
      #   access: ["read", "write"]

